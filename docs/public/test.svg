<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <clipPath id="triangle-clip">
      <polygon points="0,0 600,300 0,600" />
    </clipPath>
  </defs>

  <g clip-path="url(#triangle-clip)">
    <rect x="0" y="0"   width="600" height="100" fill="#FF6763" />
    <rect x="0" y="100" width="600" height="100" fill="#FEB044" />
    <rect x="0" y="200" width="600" height="100" fill="#FCFD96" />
    <rect x="0" y="300" width="600" height="100" fill="#9EE09E" />
    <rect x="0" y="400" width="600" height="100" fill="#9EC1CE" />
    <rect x="0" y="500" width="600" height="100" fill="#CC99C8" />
  </g>
</svg>
